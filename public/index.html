<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link 
      rel="stylesheet" 
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" 
    />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css" />
    <title>Chat App</title>
  </head>
  <body>
    <h1 class="title">IChat 💬</h1>
    <div class="main">
      <div class="name">
        <span><i class="far fa-user"></i></span>
        <input
          type="text"
          id="name-input"
          class="name-input"
          value="anonymous"
          maxlength="20"
        />
      </div>

      <ul class="message-container" id="message-container">
        <li class="message-left">
          <p class="message">
            lorem impsum dolor sit amet consectetur adipisicing elit. Voluptas, doloremque!
            <span>bluebird 🔵 20 April 01:21</span>
          </p>
        </li>

        <li class="message-right">
          <p class="message">
            lorem impsum dolor sit amet consectetur adipisicing elit. Voluptas, doloremque!
            <span><br>bluebird 🔵 20 April 01:21</span>
          </p>
        </li>
        
        <!-- <li class="message-feedback">
          <p class="feedback" id="feedback">
            Killer whale 🐋 is typing...
          </p>
        </li> -->
      </ul>

      <form class="message-form" id="message-form">
        <input type="text" name="message" id="message-input" class="message-input" placeholder="Type a message..." maxlength="200" />
        <div class="v-divider"></div>
          <button type="submit" class="send-button">
            <span><i class="fas fa-paper-plane"></i></span>
          </button>
      </form>

      <h3 class="clients-total" id="client-total">Total clients: 2</h3>

      <script src="/socket.io/socket.io.js"></script>
      <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
      <script src="main.js"></script>
  </body>
</html>
